name: CI
on: 
  push: 
    branches: [main]
    paths-ignore: 
      - '**.md'
      - 'docs/**'
      - LICENSE
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_build:
        description: "Run build job?"
        required: false
        type: boolean
        default: true
env:
  NODE_VERSION: '20'
  APP_NAME: demo-ci-actions2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
            node-version: ${{env.NODE_VERSION}}
      - name: Run linter
        run: npm run lint
  
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, version]
    if: github.event_name == 'push' || github.event.inputs.run_build == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
            node-version: ${{env.NODE_VERSION}}
      - name: Build app
        run: npm run build
      - name: Verify app
        run: |
          ls -la dist/ 
          echo "Build artifact ready"
      - name: Show version
        run: |
          echo "Version: ${{needs.version.outputs.app_version}}"
          echo "SHA: ${{needs.version.outputs.short_sha}}"
      - name: Write step summary
        run: |
          echo "## Build Report" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.version.outputs.app_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ needs.version.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY

  version:
    name: Version - output to another job
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{steps.ver.outputs.version}}
      short_sha: ${{steps.ver.outputs.sha}}
    steps:
      - id: ver
        run: |
          echo "version=1.0.0-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
  info:
    name: Info using env
    runs-on: ubuntu-latest
    steps:
      - name: Show GITHUB context
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"
          echo "Short SHA: ${GITHUB_SHA::7}"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "Run number: ${{ github.run_number }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "${{vars.APP_NAME2}}"

  notify:
    name: Notify-results
    runs-on: ubuntu-latest
    needs: [lint,test,build]
    if: always()
    steps:
      - name: Report status
        run: | 
          echo "## Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
      - name: Fail if any job is failed
        if: contains(needs.*.result, 'failure')
        run: |
          echo "::error::Pipeline failed — check individual jobs"
          exit 1